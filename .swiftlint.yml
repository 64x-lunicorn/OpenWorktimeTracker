disabled_rules:
  - trailing_whitespace
  - todo
  - nesting

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_string
  - fatal_error_message
  - first_where
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - private_action
  - private_outlet
  - sorted_first_last
  - yoda_condition

included:
  - OpenWorktimeTracker
  - OpenWorktimeTrackerTests

excluded:
  - build
  - DerivedData
  - .build

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - i

reporter: xcode
